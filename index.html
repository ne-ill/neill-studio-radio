<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neill Studio Radio</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:340px;
background:#151515;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

.album{
width:160px;
border-radius:12px;
margin:auto;
}

.title{
font-size:20px;
margin-top:10px;
}

.artist{
color:#aaa;
font-size:14px;
}

.tuner{
margin-top:20px;
}

input[type=range]{
width:100%;
}

.controls{
margin-top:20px;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
margin:5px;
background:#1f1f1f;
color:white;
cursor:pointer;
}

.modeSwitch{
margin-top:15px;
font-size:12px;
color:#999;
cursor:pointer;
}

.visualizer{
display:flex;
justify-content:center;
margin-top:20px;
gap:4px;
}

.bar{
width:4px;
height:20px;
background:#4cafef;
animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:.1s}
.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.3s}
.bar:nth-child(5){animation-delay:.4s}

@keyframes wave{
0%,100%{height:10px}
50%{height:30px}
}

#globe{
display:none;
font-size:22px;
padding:40px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>Neill Studio Radio</h2>

<img class="album" src="https://upload.wikimedia.org/wikipedia/commons/8/84/Example.svg">

<div class="title">Select Station</div>
<div class="artist">World Radio</div>

<div class="tuner">
<input type="range" min="88" max="108" value="98">
</div>

<div class="controls">
<button onclick="play()">▶ Play</button>
<button onclick="stop()">⏹ Stop</button>
</div>

<audio id="radio" controls style="width:100%; margin-top:10px;"></audio>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="modeSwitch" onclick="toggleMode()">
🌍 Switch to Globe Mode
</div>

<div id="globe">
🌍 Globe Mode Coming Soon
</div>

</div>

<script>

let radio = document.getElementById("radio")

function play(){

radio.src="https://stream-uk1.radioparadise.com/mp3-192"

radio.play()

}

function stop(){

radio.pause()

}

function toggleMode(){

let globe = document.getElementById("globe")

if(globe.style.display==="none"){
globe.style.display="block"
}else{
globe.style.display="none"
}

}

</script>

</body>
</html>
