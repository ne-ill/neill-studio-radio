<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neill Studio Radio</title>

<style>
body{
margin:0;
font-family:system-ui, Arial;
background:#0c0c0c;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:360px;
background:#151515;
border-radius:18px;
padding:18px;
box-shadow:0 0 40px rgba(0,0,0,.6);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.search{
width:100%;
padding:8px;
border-radius:8px;
border:none;
margin:10px 0;
}

.cassette{
background:#fff;
border-radius:14px;
padding:12px;
color:#000;
text-align:center;
position:relative;
}

.reels{
display:flex;
justify-content:space-between;
margin-top:8px;
}

.reel{
width:40px;
height:40px;
border-radius:50%;
border:4px solid #000;
position:relative;
animation:spin 3s linear infinite;
}

.reel::after{
content:'';
position:absolute;
width:6px;
height:6px;
background:#000;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

.stationTitle{
font-size:16px;
font-weight:bold;
margin-top:6px;
}

.song{
font-size:13px;
color:#555;
}

.controls{
margin-top:12px;
display:flex;
justify-content:center;
gap:10px;
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:#fff;
cursor:pointer;
}

.list{
max-height:150px;
overflow:auto;
margin-top:10px;
font-size:14px;
}

.item{
padding:6px;
border-bottom:1px solid #222;
cursor:pointer;
}

.favs{
margin-top:8px;
font-size:13px;
color:#aaa;
}

.watermark{
text-align:center;
font-size:10px;
margin-top:10px;
color:#777;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div>📻 Neill Radio</div>
<button onclick="toggleGlobe()">🌍</button>
</div>

<input class="search" id="search" placeholder="Search station or country..." />

<div class="cassette">
<img id="art" src="" width="60">
<div class="stationTitle" id="station">Select station</div>
<div class="song" id="song">---</div>

<div class="reels">
<div class="reel"></div>
<div class="reel"></div>
</div>
</div>

<div class="controls">
<button onclick="play()">▶ Play</button>
<button onclick="stop()">⏹ Stop</button>
<button onclick="saveFav()">⭐ Fav</button>
</div>

<audio id="audio" controls style="width:100%; margin-top:8px;"></audio>

<div class="list" id="list"></div>

<div class="favs" id="favs"></div>

<div class="watermark">Neill Studio</div>

</div>

<script>
let stations=[]
let current=null
const audio=document.getElementById("audio")

// load stations
fetch("https://de1.api.radio-browser.info/json/stations/topclick/200")
.then(r=>r.json())
.then(data=>{
stations=data
renderList(stations)
})

function renderList(list){
const box=document.getElementById("list")
box.innerHTML=""
list.forEach(s=>{
const d=document.createElement("div")
d.className="item"
d.textContent=s.name+" ("+s.country+")"
d.onclick=()=>selectStation(s)
box.appendChild(d)
})
}

function selectStation(s){
current=s
document.getElementById("station").textContent=s.name
document.getElementById("art").src=s.favicon
audio.src=s.url_resolved
}

function play(){
if(current) audio.play()
}

function stop(){
audio.pause()
}

document.getElementById("search").addEventListener("input",e=>{
let q=e.target.value.toLowerCase()
renderList(stations.filter(s=>
s.name.toLowerCase().includes(q) ||
s.country.toLowerCase().includes(q)
))
})

function saveFav(){
if(!current) return
let f=JSON.parse(localStorage.getItem("favs")||"[]")
f.push(current)
localStorage.setItem("favs",JSON.stringify(f))
showFavs()
}

function showFavs(){
let f=JSON.parse(localStorage.getItem("favs")||"[]")
let div=document.getElementById("favs")
div.innerHTML="⭐ Favorites: "+f.map(x=>x.name).join(", ")
}

showFavs()

function toggleGlobe(){
alert("3D Globe mode will open in next upgrade 🌍")
}
</script>

</body>
</html>
