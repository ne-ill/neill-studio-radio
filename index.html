<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neill Studio World Radio</title>

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<script src="https://unpkg.com/globe.gl"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
}

#globeViz{
width:100vw;
height:100vh;
}

.panel{
position:absolute;
top:20px;
left:20px;
background:#111;
padding:15px;
border-radius:15px;
width:260px;
}

.title{
font-family:'DotGothic16';
font-size:22px;
letter-spacing:4px;
margin-bottom:10px;
}

.stationList{
max-height:200px;
overflow:auto;
font-size:13px;
}

.station{
padding:6px;
border-bottom:1px solid #333;
cursor:pointer;
}

.station:hover{
background:#222;
}

.knob{
width:60px;
height:60px;
border-radius:50%;
background:#222;
display:flex;
align-items:center;
justify-content:center;
margin-top:10px;
transition:transform .4s;
}

.knob.playing{
transform:rotate(140deg);
}

.visualizer{
display:flex;
gap:3px;
margin-top:10px;
}

.bar{
width:4px;
height:8px;
background:white;
animation:move .5s infinite alternate;
}

@keyframes move{
from{height:6px}
to{height:22px}
}

.watermark{
position:absolute;
bottom:10px;
right:15px;
font-size:12px;
opacity:0.6;
}

input{
width:150px;
padding:5px;
margin-bottom:6px;
}

button{
padding:4px 8px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="globeViz"></div>

<div class="panel">

<div class="title">WORLD RADIO</div>

<input id="search" placeholder="Country">
<button onclick="loadCountry()">Load</button>

<div class="knob" id="dial">🎛</div>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="stationList" id="stations"></div>

<audio id="radio" controls></audio>

</div>

<div class="watermark">
Neill Studio
</div>

<script>

const globe = Globe()(document.getElementById('globeViz'))
.globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')

let radio=document.getElementById("radio")

let markers=[]

function loadStations(country){

fetch("https://all.api.radio-browser.info/json/stations/bycountry/"+country)

.then(res=>res.json())

.then(data=>{

let list=document.getElementById("stations")
list.innerHTML=""

data.slice(0,100).forEach(st=>{

let div=document.createElement("div")
div.className="station"
div.innerText=st.name

div.onclick=function(){

radio.src=st.url
radio.play()

document.getElementById("dial").classList.add("playing")

}

list.appendChild(div)

})

})

}

function loadCountry(){

let country=document.getElementById("search").value
loadStations(country)

}

fetch('https://unpkg.com/world-atlas@2/countries-110m.json')
.then(res => res.json())
.then(data => {

const countries = topojson.feature(data, data.objects.countries).features

globe
.polygonsData(countries)
.polygonAltitude(0.01)
.polygonCapColor(() => 'rgba(200,200,200,0.15)')
.polygonSideColor(() => 'rgba(0,0,0,0.1)')
.polygonStrokeColor(() => '#111')
.onPolygonClick(d => {

let name = d.properties.name

loadStations(name)

let lat = d.properties.latitude || 0
let lng = d.properties.longitude || 0

markers = [{
lat: d.properties.latitude || d.properties.lat || 0,
lng: d.properties.longitude || d.properties.lng || 0,
size: 0.4,
color: 'red'
}]

globe.pointsData(markers)

})

})

</script>

</body>
</html>
